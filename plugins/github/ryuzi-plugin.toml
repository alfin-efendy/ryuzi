id = "github"
name = "GitHub"
version = "0.1.1"
wit-api = ">=0.1.0, <0.2.0"
lifecycle = "per-call"
component = "github.wasm"
publisher = "Ryuzi"
description = "GitHub connector: auth status, repositories, issues, and pull requests, plus arbitrary REST/GraphQL calls, over host-managed OAuth. Every mutating tool (issue/PR create, comment, review, merge, GraphQL mutations) is gated behind an explicit `confirm=true` argument — an unconfirmed mutation never leaves the component."

# The only hosts the component may reach through the host-mediated OAuth egress
# (`ryuzi:oauth/oauth`'s `authorized-request`, which is bounded to this same
# allowlist). `api.github.com` carries every REST/GraphQL API call the tools
# make; `github.com` is where the host-driven OAuth (authorize / token / device
# code) endpoints live — the component itself never calls github.com, but the
# profile below authorizes against it.
[permissions]
network = ["api.github.com", "github.com"]

# Host-managed OAuth profile (Task 8). The component only ever calls
# `authorized-request("github", ..)` / `disconnect("github")`; it never drives
# Device Flow or PKCE and never sees a token — Cockpit + the host own that (see
# crates/core/src/plugins/capabilities/oauth.rs). Field names mirror
# `ryuzi_plugin_sdk::OAuthProfile` (kebab-case).
[[oauth]]
id = "github"
authorize-url = "https://github.com/login/oauth/authorize"
token-url = "https://github.com/login/oauth/access_token"
# The RFC 8628 device-authorization endpoint. Cockpit connects this profile via
# the device grant (the only flow that completes for component profiles), and
# the host's `begin_device_flow` reads this URL off the profile.
device-authorization-url = "https://github.com/login/device/code"
scopes = ["repo", "read:org", "user"]
# GitHub OAuth apps do not support RFC 7591 Dynamic Client Registration. Instead
# — the `gh` CLI model — this component ships a first-party PUBLIC OAuth App
# client id so an end-user connects with zero configuration. It is public, not a
# secret (device flow uses a public client, no client secret). A user-set
# client-id-setting or a stored per-install client id still overrides it.
# The Ryuzi GitHub OAuth App client id (registered with "Enable Device Flow").
# Public identifier, not a secret.
client-id = "Ov23lijhiwiIgxoH2VcV"
dynamic-registration = false
