id = "openai"
name = "OpenAI"
version = "0.1.0"
wit-api = ">=0.1.0, <0.2.0"
lifecycle = "per-call"
component = "openai.wasm"
publisher = "Ryuzi"
description = "OpenAI chat provider. Talks to api.openai.com/v1 with the user's stored API key, which the host injects through ryuzi:provider-auth — the component never sees the key."

# The LLM-router provider id(s) this bundle backs. Declaring it EXPLICITLY is
# what authorizes the host-mediated `ryuzi:provider-auth` capability
# (`HostPolicy::for_installed_bundle` requires a non-empty `provider-ids` AND a
# network host; the `[id]` fallback used for transport registration
# deliberately does NOT grant credential access).
provider-ids = ["openai"]

# The only host the component may reach. The host enforces this allowlist on
# every credentialed request and re-checks it on each redirect hop, so the
# user's API key can only ever travel to api.openai.com. Covers both the
# `/v1/models` and `/v1/chat/completions` endpoints.
[permissions]
network = ["api.openai.com"]
