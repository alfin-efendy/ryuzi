version: 2
project_name: ryuzi

# ---------------------------------------------------------------------------
# Pre-build hooks
# ---------------------------------------------------------------------------
# Note: GoReleaser manages the ryuzi CLI builds (bun --compile).
# The Cockpit desktop app (Tauri) is NOT built by GoReleaser — it is built by
# the cockpit-desktop GitHub Actions workflow (.github/workflows/cockpit-desktop.yml).
# That workflow already runs build-acp-sidecar.ts before tauri-action.
#
# The hook below ensures the ACP sidecar binary is compiled for the host
# platform when running `goreleaser release --snapshot` or similar local runs
# that also exercise the cockpit build path.
before:
  hooks:
    # Build the claude-agent-acp sidecar for the host target.
    # NOTE: this hook is only needed for local Tauri desktop builds (tauri dev /
    # tauri build).  Pure CLI-only goreleaser runs (no Tauri step) still execute
    # this hook but it is harmless — the binaries/ dir is not consumed by
    # goreleaser builds.  The Cockpit CI build (cockpit-desktop.yml) runs this
    # script directly on the matching runner before tauri-action.
    - bun run scripts/build-acp-sidecar.ts

builds:
  - id: ryuzi-gnu-other
    builder: bun
    binary: ryuzi
    main: apps/cli/src/cli/index.ts
    targets:
      - linux-x64
      - linux-arm64
      - darwin-x64
      - darwin-arm64
      - windows-x64
    flags:
      - --compile
      - --minify

  - id: ryuzi-musl
    builder: bun
    binary: ryuzi
    main: apps/cli/src/cli/index.ts
    targets:
      - linux-x64-musl
      - linux-arm64-musl
    flags:
      - --compile
      - --minify

archives:
  - id: default
    ids: [ryuzi-gnu-other]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [README*]

  - id: musl
    ids: [ryuzi-musl]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_musl"
    files: [README*]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

homebrew_casks:
  - name: ryuzi
    ids: [default]
    binaries: [ryuzi]
    repository:
      owner: alfin-efendy
      name: homebrew-ryuzi
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/alfin-efendy/ryuzi"
    description: "Gateway-agnostic control plane for agent harnesses (ryuzi CLI)"
    commit_author:
      name: goreleaserbot
      email: bot@ryuzi.dev

scoops:
  - name: ryuzi
    repository:
      owner: alfin-efendy
      name: scoop-ryuzi
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/alfin-efendy/ryuzi"
    description: "Gateway-agnostic control plane for agent harnesses (ryuzi CLI)"
    license: MIT
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"

dockers:
  - id: amd64
    ids: [ryuzi-musl]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source=https://github.com/alfin-efendy/ryuzi"

  - id: arm64
    ids: [ryuzi-musl]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source=https://github.com/alfin-efendy/ryuzi"

docker_manifests:
  - name_template: "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}"
    image_templates:
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-amd64"
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-arm64"
  - name_template: "ghcr.io/alfin-efendy/ryuzi:latest"
    image_templates:
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-amd64"
      - "ghcr.io/alfin-efendy/ryuzi:{{ .Version }}-arm64"

release:
  github:
    owner: alfin-efendy
    name: ryuzi
  mode: append
  replace_existing_artifacts: true
