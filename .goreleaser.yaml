version: 2
project_name: ryuzi

# Linux targets cross-build via cargo-zigbuild (zig = C toolchain); darwin
# targets build with plain cargo on the macOS host — zig ships libSystem stubs
# but NO Apple framework stubs, and keyring (OS keychain, #57) links
# Security.framework + CoreFoundation, so zigbuild-linked darwin binaries die
# at link time with "undefined symbol: _SecKeychain*" (killed the v0.5.0
# goreleaser job). The release workflow installs zig + cargo-zigbuild and
# embeds the freshly built sidecar manifest into crates/core BEFORE goreleaser
# runs; goreleaser itself runs `rustup target add` per declared target.

builds:
  - id: ryuzi
    builder: rust
    binary: ryuzi
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    flags:
      - --release
      - -p=ryuzi-cli

  - id: ryuzi-darwin
    builder: rust
    binary: ryuzi
    command: build # native cargo, NOT zigbuild — see header comment
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    flags:
      - --release
      - -p=ryuzi-cli

  - id: ryuzi-musl
    builder: rust
    binary: ryuzi
    targets:
      - x86_64-unknown-linux-musl
      - aarch64-unknown-linux-musl
    flags:
      - --release
      - -p=ryuzi-cli

archives:
  # Deliberate cut-over break (design §10): triple-based names that the
  # in-field TS self-updater can never match, and that MUST agree
  # byte-for-byte with crates/core/src/update/asset.rs::asset_name.
  - id: default
    ids: [ryuzi, ryuzi-darwin]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Target }}"
    files: [README*]

  - id: musl
    ids: [ryuzi-musl]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Target }}"
    files: [README*]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# release-please owns the release notes; without this, `release.mode: append`
# would also append a goreleaser-generated commit-log changelog on upload.
changelog:
  disable: true

# homebrew_casks: REMOVED (2026-07-04) — brew distribution dropped by decision;
# no tap repo/token exists. Install paths are curl|sh, npm, and GitHub Releases.

# scoops: REMOVED — the Rust CLI ships no Windows binaries (unix-only daemon).
# In-field TS scoop installs stay on 0.3.0; their updater no-ops by design.

# dockers/docker_manifests: REMOVED — goreleaser runs on macos-latest (the
# only host that can link darwin binaries; linux targets cross-compile via
# zigbuild), where docker is unavailable. Images are built by the dedicated
# `docker` job in release.yml from the released musl tarballs.

release:
  github:
    owner: alfin-efendy
    name: ryuzi
  mode: append
  replace_existing_artifacts: true
