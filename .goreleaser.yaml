version: 2
project_name: ryuzi

# Rust cross-builds via cargo-zigbuild (zig = C toolchain for every target).
# The release workflow installs zig + cargo-zigbuild and embeds the freshly
# built sidecar manifest into crates/core BEFORE goreleaser runs; goreleaser
# itself runs `rustup target add` per declared target.

builds:
  - id: ryuzi
    builder: rust
    binary: ryuzi
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    flags:
      - --release
      - -p=ryuzi-cli

  - id: ryuzi-musl
    builder: rust
    binary: ryuzi
    targets:
      - x86_64-unknown-linux-musl
      - aarch64-unknown-linux-musl
    flags:
      - --release
      - -p=ryuzi-cli

archives:
  # Deliberate cut-over break (design §10): triple-based names that the
  # in-field TS self-updater can never match, and that MUST agree
  # byte-for-byte with crates/core/src/update/asset.rs::asset_name.
  - id: default
    ids: [ryuzi]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Target }}"
    files: [README*]

  - id: musl
    ids: [ryuzi-musl]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Target }}"
    files: [README*]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

homebrew_casks:
  - name: ryuzi
    ids: [default]
    binaries: [ryuzi]
    repository:
      owner: alfin-efendy
      name: homebrew-ryuzi
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/alfin-efendy/ryuzi"
    description: "Gateway-agnostic control plane for agent harnesses (ryuzi CLI)"
    commit_author:
      name: goreleaserbot
      email: bot@ryuzi.dev

# scoops: REMOVED — the Rust CLI ships no Windows binaries (unix-only daemon).
# In-field TS scoop installs stay on 0.3.0; their updater no-ops by design.

# dockers/docker_manifests: REMOVED — goreleaser runs on macos-latest (the
# only host that can link darwin binaries; linux targets cross-compile via
# zigbuild), where docker is unavailable. Images are built by the dedicated
# `docker` job in release.yml from the released musl tarballs.

release:
  github:
    owner: alfin-efendy
    name: ryuzi
  mode: append
  replace_existing_artifacts: true
