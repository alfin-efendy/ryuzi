name: setup-bun
description: Pinned Bun toolchain + frozen-lockfile install (repo standard)
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.14
    - run: bun install --frozen-lockfile
      shell: bash
