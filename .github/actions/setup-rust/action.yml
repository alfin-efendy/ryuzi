name: setup-rust
description: Pinned Rust toolchain + shared cargo cache (repo standard)
inputs:
  components:
    description: Comma-separated rustup components (e.g. "clippy, rustfmt")
    default: ""
  cache:
    description: >-
      Enable the shared cargo cache. Release builds set "false": rust-cache
      keys share a prefix across workflows whose job is named `build`, and a
      stale restore once shipped a fingerprint for a crate whose rlib was
      pruned — cargo then skips compiling it and rustc dies with E0463
      (keyring, run 28958324320). Release artifacts build clean instead.
    default: "true"
runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      with:
        components: ${{ inputs.components }}
        targets: wasm32-wasip2
    - if: inputs.cache == 'true'
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        # Only the root workspace's `target` is cached. The first-party plugin
        # components under `plugins/<id>/` are standalone workspaces the
        # ryuzi-core conformance/e2e tests build into per-plugin `target/` dirs,
        # so those component builds cold-compile each run. They are intentionally
        # NOT cached: rust-cache resolves each `workspaces` root literally (no
        # globs — `plugins/*` cannot work), and those workspaces ship no committed
        # Cargo.lock, so their dep graph floats between runs — exactly the
        # stale-restore case that produced E0463 here before (see the `cache`
        # input note above). Revisit only with committed lockfiles + explicit
        # per-dir entries.
        workspaces: ". -> target"
