name: npm-publish
# Manually publish the npm binary-wrapper packages on demand, for a given version.
# Downloads the already-released tarballs for the given tag (gh release download)
# and republishes them to npm under the supplied version — no rebuild, since the
# binaries were already built and released by the `release` workflow.
# Use when a release's npm job needs to be (re)run, or when npm was added/renamed
# after a release was already cut.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Download the released binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release download "v${VERSION}" --pattern 'ryuzi-*.tar.gz' -D out/
      - name: Stamp version + assemble packages
        env:
          VERSION: ${{ inputs.version }}
        run: |
          bun scripts/npm/set-version.ts "${VERSION}"
          ./scripts/npm/assemble.sh
      - name: Publish platform packages first
        run: |
          for dir in npm/platform/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "skip ${name}@${ver} (already published)"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package last
        run: |
          name=$(node -p "require('./npm/ryuzi/package.json').name")
          ver=$(node -p "require('./npm/ryuzi/package.json').version")
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "skip ${name}@${ver} (already published)"
          else
            npm publish ./npm/ryuzi --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
