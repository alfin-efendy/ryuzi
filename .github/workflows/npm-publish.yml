name: npm-publish
# Manually publish the npm binary-wrapper packages on demand, for a given version.
# Builds the 7 binaries from the CURRENT default-branch code and publishes them
# under the supplied version (the app code on main matches the released tag of
# the same version, so this is equivalent to publishing that release to npm).
# Use when a release's npm job needs to be (re)run, or when npm was added/renamed
# after a release was already cut.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: ./scripts/build-binaries.sh
      - name: Stamp version + assemble packages
        run: |
          bun scripts/npm/set-version.ts "${{ inputs.version }}"
          ./scripts/npm/assemble.sh
      - name: Publish platform packages first
        run: |
          for dir in npm/platform/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "skip ${name}@${ver} (already published)"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package last
        run: |
          name=$(node -p "require('./npm/harness-router/package.json').name")
          ver=$(node -p "require('./npm/harness-router/package.json').version")
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "skip ${name}@${ver} (already published)"
          else
            npm publish ./npm/harness-router --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
