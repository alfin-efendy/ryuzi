name: cockpit-release
# Builds Cockpit installers for an existing unified `vX.Y.Z` GitHub release
# (cockpit no longer gets its own release/tag — its independent version lives
# in tauri.conf.json at the tag, stamped by release-please) and uploads them
# + checksums onto that release. Called from release.yml on every CLI
# release; dispatchable manually to (re)build installers for any release tag.
#
# Signing is READY but dormant: the Apple env vars are only exported when the
# APPLE_CERTIFICATE secret exists (Tauri attempts codesigning whenever the
# variable is PRESENT — even set-but-empty, which is what an absent secret
# evaluates to; that broke the v0.5.0 macos build). Windows signing
# additionally needs bundle.windows.signCommand in tauri.conf.json once a
# certificate exists. Until then release notes must carry the Gatekeeper
# (`xattr -d com.apple.quarantine`) / SmartScreen bypass instructions.
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build from and upload to (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            slug: windows-x64
            args: ""
          - runner: windows-11-arm
            slug: windows-arm64
            args: ""
          - runner: macos-latest
            slug: macos-universal
            args: "--target universal-apple-darwin"
          - runner: ubuntu-22.04 # oldest supported Ubuntu = glibc floor
            slug: linux-x64
            args: ""
          - runner: ubuntu-22.04-arm
            slug: linux-arm64
            args: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup-bun
      - uses: ./.github/actions/setup-rust
        with:
          cache: "false" # release installers build clean — see setup-rust's cache input
      - name: Add both darwin targets (universal build links x64 + arm64)
        if: matrix.slug == 'macos-universal'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Install Linux system deps (Tauri)
        if: startsWith(matrix.slug, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      # The tracked crates/core/sidecar.manifest.json pins release_tag v0.0.0;
      # shipping it means every sidecar download from a released Cockpit 404s.
      # The `sidecar` job in release.yml uploads the real manifest.json as a
      # release asset before this workflow runs (and it stays there for manual
      # re-dispatches), so embed it from the release itself.
      - name: Embed the release sidecar manifest (pins adapter version + sha256)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" \
            --pattern manifest.json --output crates/core/sidecar.manifest.json --clobber
          cat crates/core/sidecar.manifest.json
      # Absent secrets evaluate to "" but the env var is still SET, and Tauri
      # keys "should I sign?" on presence alone — it then feeds the empty cert
      # to `security import`, which fails the build. Export the signing env
      # only when the certificate secret actually exists.
      - name: Export Apple signing env (only when the certificate secret exists)
        if: matrix.slug == 'macos-universal'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret — building unsigned."
            exit 0
          fi
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            [ -n "${!name}" ] || continue
            {
              echo "${name}<<__SIGNING_EOF__"
              printf '%s\n' "${!name}"
              echo "__SIGNING_EOF__"
            } >> "$GITHUB_ENV"
          done
      - name: Build installers
        run: bun run --cwd apps/cockpit tauri build ${{ matrix.args }}
      - name: Collect bundles
        shell: bash
        # find, not bash globstar — macOS ships bash 3.2, where
        # `shopt -s globstar` doesn't exist (killed the v0.5.0 macos job
        # right after its first-ever successful .dmg bundling).
        run: |
          mkdir -p out
          find target -type f \
            \( -path '*/release/bundle/nsis/*.exe' \
            -o -path '*/release/bundle/dmg/*.dmg' \
            -o -path '*/release/bundle/deb/*.deb' \
            -o -path '*/release/bundle/rpm/*.rpm' \) \
            -exec cp {} out/ \;
          ls -la out/
          [ -n "$(ls -A out/)" ] || { echo "no bundles produced"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cockpit-${{ matrix.slug }}
          path: out/*
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cockpit-*
          merge-multiple: true
          path: assets
      - name: Checksums + upload to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          cd assets
          sha256sum -- * > cockpit-checksums.txt
          gh release upload "$TAG" --repo "${{ github.repository }}" --clobber -- *
