name: cockpit-release
# Builds Cockpit installers for an existing `cockpit-vX.Y.Z` GitHub release
# and uploads them + checksums. Called from release.yml when release-please
# cuts a cockpit release; dispatchable manually to (re)build for any tag.
#
# Signing is READY but dormant: the Apple env vars below are empty until the
# secrets exist, and Tauri skips signing when they are empty. Windows signing
# additionally needs bundle.windows.signCommand in tauri.conf.json once a
# certificate exists. Until then release notes must carry the Gatekeeper
# (`xattr -d com.apple.quarantine`) / SmartScreen bypass instructions.
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing cockpit release tag (e.g. cockpit-v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            slug: windows-x64
            args: ""
          - runner: windows-11-arm
            slug: windows-arm64
            args: ""
          - runner: macos-latest
            slug: macos-universal
            args: "--target universal-apple-darwin"
          - runner: ubuntu-22.04 # oldest supported Ubuntu = glibc floor
            slug: linux-x64
            args: ""
          - runner: ubuntu-22.04-arm
            slug: linux-arm64
            args: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup-bun
      - uses: ./.github/actions/setup-rust
      - name: Add both darwin targets (universal build links x64 + arm64)
        if: matrix.slug == 'macos-universal'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Install Linux system deps (Tauri)
        if: startsWith(matrix.slug, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build installers
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run --cwd apps/cockpit tauri build ${{ matrix.args }}
      - name: Collect bundles
        shell: bash
        run: |
          shopt -s nullglob globstar
          mkdir -p out
          for f in target/**/release/bundle/nsis/*.exe \
                   target/**/release/bundle/dmg/*.dmg \
                   target/**/release/bundle/deb/*.deb \
                   target/**/release/bundle/rpm/*.rpm; do
            cp "$f" out/
          done
          ls -la out/
          [ -n "$(ls -A out/)" ] || { echo "no bundles produced"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cockpit-${{ matrix.slug }}
          path: out/*
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cockpit-*
          merge-multiple: true
          path: assets
      - name: Checksums + upload to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          cd assets
          sha256sum -- * > cockpit-checksums.txt
          gh release upload "$TAG" --repo "${{ github.repository }}" --clobber -- *
