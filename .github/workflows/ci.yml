name: ci
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 20 * * *" # nightly full matrix, 03:00 WIB
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Computes which areas a PR touches. On push/schedule/dispatch every output
  # is 'true' (full matrix, no filtering). Job-level `if:` gating (instead of
  # `on.paths`) keeps skipped required checks green under branch protection.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ts: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.ts }}
      rust: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.rust }}
      cockpit: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.cockpit }}
      deps: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.deps }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            ts:
              - "packages/**"
              - "apps/cli/**"
              - "apps/cockpit/src/**"
              - "apps/**/tsconfig*.json"
              - "scripts/**"
              - "tsconfig*.json"
              - "package.json"
              - "bun.lock"
              - ".github/**"
            rust:
              - "crates/**"
              - "apps/cockpit/src-tauri/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/**"
            cockpit:
              - "apps/cockpit/**"
              - "packages/ui/**"
              - "bun.lock"
              - ".github/**"
            deps:
              - "bun.lock"
              - "Cargo.lock"
              - "osv-scanner.toml"
              - ".github/**"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun
      - run: bunx biome ci .
      - run: shellcheck install.sh

  ts:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun
      - name: Configure git identity (some tests create real commits)
        run: |
          git config --global user.email "ci@ryuzi.dev"
          git config --global user.name "ryuzi CI"
      - run: bun run typecheck
      - run: bun test

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
      - name: Configure git identity (core tests create real commits)
        run: |
          git config --global user.email "ci@ryuzi.dev"
          git config --global user.name "ryuzi CI"
      - run: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
      - run: cargo clippy -p ryuzi-core -p ryuzi-cli --all-targets -- -D warnings
        if: matrix.os == 'ubuntu-latest'
      - run: cargo test -p ryuzi-core -p ryuzi-cli
      - name: Build + smoke the CLI binary (absorbs the old build-smoke job)
        run: |
          cargo build -p ryuzi-cli
          ./target/debug/ryuzi --version
          ./target/debug/ryuzi --help

  e2e-cockpit:
    needs: changes
    if: needs.changes.outputs.cockpit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun
      - run: bunx playwright install --with-deps chromium
      - run: bun run --cwd apps/cockpit build
      - run: bun run --cwd apps/cockpit e2e:ci
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: apps/cockpit/playwright-report/
          retention-days: 7

  osv:
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan lockfiles
        id: scan
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --format=json
            --output=osv-results.json
            --lockfile=bun.lock
            --lockfile=Cargo.lock
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: osv-results
          path: osv-results.json
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail if the scan found vulnerabilities
        if: steps.scan.outcome == 'failure'
        run: |
          echo "osv-scanner found vulnerabilities — see the osv-results artifact / PR comment."
          echo "Accepted risks belong in osv-scanner.toml with a reason."
          exit 1

  report:
    needs: [changes, lint, ts, rust, e2e-cockpit, osv]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true # artifact absent when the osv job was skipped
        with:
          name: osv-results
          path: .
      - name: Compose the report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJSON(needs) }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/pr-report.sh > report.md
      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: ci-report
          path: report.md

  # Post-merge safety net: PRs get the sticky comment, main/nightly gets an
  # issue so macOS-only or nightly-only breakage cannot pass silently.
  watchdog:
    needs: [changes, lint, ts, rust, e2e-cockpit, osv]
    if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open/update or close the ci-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJSON(needs) }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
        run: |
          failed=$(jq -r '[to_entries[] | select(.value.result == "failure") | .key] | join(", ")' <<<"$NEEDS_JSON")
          existing=$(gh issue list --repo "$REPO" --label ci-failure --state open --json number --jq '.[0].number // empty')
          if [ -n "$failed" ]; then
            title="CI failure on ${EVENT}: ${failed}"
            body=$(printf 'Failed jobs: %s\nRun: %s' "$failed" "$RUN_URL")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$REPO" --title "$title"
              gh issue comment "$existing" --repo "$REPO" --body "$body"
            else
              gh issue create --repo "$REPO" --label ci-failure --title "$title" --body "$body"
            fi
          elif [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$REPO" --comment "Green again: $RUN_URL"
          fi

  # The single branch-protection gate. Matrix jobs report "ts (ubuntu-latest)"
  # when they run but bare "ts" when skipped via `if:` — so per-matrix names
  # can never be required without wedging path-filtered PRs. This job always
  # reports under one stable name and fails iff any needed job failed or was
  # cancelled (skipped = fine by design).
  ci-ok:
    needs: [changes, lint, ts, rust, e2e-cockpit, osv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed or was cancelled
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          bad=$(jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key] | join(", ")' <<<"$NEEDS_JSON")
          if [ -n "$bad" ]; then
            echo "failed/cancelled: $bad"
            exit 1
          fi
          echo "all gated jobs green or intentionally skipped"
