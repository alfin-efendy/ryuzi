name: release
on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # One GitHub release per cycle: only crates/cli creates a release + tag
    # (vX.Y.Z). cockpit and core are skip-github-release packages — they keep
    # independent versions and changelogs in the same release PR, and the
    # cockpit installers are uploaded onto the CLI release by the jobs below
    # (skipped packages emit no action outputs, so nothing cockpit-* here).
    outputs:
      release_created: ${{ steps.rp.outputs['crates/cli--release_created'] }}
      tag_name: ${{ steps.rp.outputs['crates/cli--tag_name'] }}
    steps:
      # skip-github-release packages never get tags from release-please (tags
      # only come with GitHub releases), yet its fallback lookup for "last
      # release" is the tag `<component>-v<manifest version>`. Without these
      # tags, every release merge spawns a phantom release PR that restarts
      # cockpit/core at 0.1.0 with a full-history changelog (that was PR #66).
      # Anchor = the last commit that touched the manifest, i.e. the release
      # commit that stamped the versions currently in it. Runs BEFORE the
      # release-please step so the tags exist by the time it looks for them.
      - name: Tag skipped packages (cockpit, core) so release-please keeps tracking them
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          anchor=$(gh api "repos/${GITHUB_REPOSITORY}/commits?path=.release-please-manifest.json&per_page=1" -q '.[0].sha')
          manifest=$(gh api "repos/${GITHUB_REPOSITORY}/contents/.release-please-manifest.json?ref=${anchor}" -q '.content' | base64 -d)
          for entry in "cockpit=apps/cockpit/src-tauri" "core=crates/core"; do
            component="${entry%%=*}" path="${entry#*=}"
            version=$(printf '%s' "$manifest" | jq -r --arg p "$path" '.[$p]')
            tag="${component}-v${version}"
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              echo "${tag} already exists"
            else
              gh api "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${tag}" -f sha="${anchor}" >/dev/null
              echo "created ${tag} @ ${anchor}"
            fi
          done
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    # macos-latest: the ONLY host that can link the darwin targets (needs the
    # macOS SDK); the 4 linux targets cross-compile mac->linux via zigbuild.
    # Docker is not available here — images are built by the `docker` job below.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0
      - run: cargo install --locked cargo-zigbuild
      # `--skip=validate` (on the goreleaser step below) is kept deliberately:
      # this job only runs on the release-please merge commit, where goreleaser's
      # tag cross-check adds nothing but flake surface.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [release-please, goreleaser]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (for the Dockerfile)
      - name: Download the released musl binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.release-please.outputs.tag_name }}" \
            --pattern 'ryuzi-*-linux-musl.tar.gz' -D dl/
          mkdir -p ctx/amd64 ctx/arm64
          tar -xzf dl/ryuzi-*-x86_64-linux-musl.tar.gz  -C ctx/amd64 ryuzi
          tar -xzf dl/ryuzi-*-aarch64-linux-musl.tar.gz -C ctx/arm64 ryuzi
          cp Dockerfile ctx/amd64/ && cp Dockerfile ctx/arm64/
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, push, and manifest
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          IMG="ghcr.io/alfin-efendy/ryuzi"
          LABELS="--label org.opencontainers.image.version=${VERSION} \
                  --label org.opencontainers.image.revision=${GITHUB_SHA} \
                  --label org.opencontainers.image.source=https://github.com/alfin-efendy/ryuzi"
          docker buildx build --push --pull --platform linux/amd64 $LABELS -t "$IMG:${VERSION}-amd64" ctx/amd64
          docker buildx build --push --pull --platform linux/arm64 $LABELS -t "$IMG:${VERSION}-arm64" ctx/arm64
          docker buildx imagetools create -t "$IMG:${VERSION}" -t "$IMG:latest" \
            "$IMG:${VERSION}-amd64" "$IMG:${VERSION}-arm64"

  npm:
    needs: [release-please, goreleaser]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Download the released binaries (no rebuild — one provenance per release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Anchored pattern: the unified release also carries Cockpit
        # installers; this must only ever match the goreleaser CLI tarballs
        # (ryuzi-<ver>-<platform-tag>.tar.gz), never a future cockpit .tar.gz bundle.
        run: gh release download "${{ needs.release-please.outputs.tag_name }}" --pattern 'ryuzi-*-*-*.tar.gz' -D out/
      - name: Stamp version + assemble packages
        run: |
          VERSION="${TAG#v}"
          bun scripts/npm/set-version.ts "$VERSION"
          ./scripts/npm/assemble.sh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
      - name: Publish platform packages first
        run: |
          for dir in npm/platform/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "skip ${name}@${ver} (already published)"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package last
        run: |
          name=$(node -p "require('./npm/ryuzi/package.json').name")
          ver=$(node -p "require('./npm/ryuzi/package.json').version")
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "skip ${name}@${ver} (already published)"
          else
            npm publish ./npm/ryuzi --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Cockpit rides the same vX.Y.Z release as the CLI ("one release" model):
  # installers are built from the release tag (whose tree carries the cockpit
  # version release-please stamped into tauri.conf.json) and uploaded onto the
  # CLI release.
  cockpit:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/cockpit-release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  # The release is only "done" when every artifact family is present — a
  # partial upload (like v0.4.0, which died mid-pipeline with only some
  # artifact families uploaded) must fail loudly here instead of shipping
  # silently. Also appends the
  # Cockpit section to the release notes (release-please only writes the CLI
  # changelog into the release body).
  finalize:
    needs: [release-please, goreleaser, cockpit]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify the release carries every artifact family
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          assets=$(gh release view "$TAG" --json assets -q '.assets[].name')
          echo "$assets"
          fail=0
          for want in \
            'ryuzi-.+-x86_64-linux-gnu\.tar\.gz' \
            'ryuzi-.+-aarch64-linux-gnu\.tar\.gz' \
            'ryuzi-.+-x86_64-linux-musl\.tar\.gz' \
            'ryuzi-.+-aarch64-linux-musl\.tar\.gz' \
            'ryuzi-.+-x86_64-apple-darwin\.tar\.gz' \
            'ryuzi-.+-aarch64-apple-darwin\.tar\.gz' \
            '^checksums\.txt$' \
            '-setup\.exe$' \
            '\.dmg$' \
            '\.deb$' \
            '\.rpm$' \
            '^cockpit-checksums\.txt$'; do
            echo "$assets" | grep -qE "$want" || { echo "::error::release $TAG is missing an asset matching: $want"; fail=1; }
          done
          exit $fail
      - name: Append the Cockpit section to the release notes (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          body=$(gh release view "$TAG" --json body -q .body)
          if printf '%s' "$body" | grep -q '<!-- cockpit-notes -->'; then
            echo "cockpit section already present; skipping"
            exit 0
          fi
          ver=$(jq -r .version apps/cockpit/src-tauri/tauri.conf.json)
          {
            printf '%s\n\n' "$body"
            printf '<!-- cockpit-notes -->\n'
            printf '## Cockpit %s (desktop app)\n\n' "$ver"
            printf 'Installers are attached to this release: `*-setup.exe` (Windows x64/arm64), `.dmg` (macOS universal), `.deb`/`.rpm` (Linux x64/arm64). Verify downloads against `cockpit-checksums.txt`. Changelog: apps/cockpit/src-tauri/CHANGELOG.md.\n'
          } > /tmp/notes.md
          gh release edit "$TAG" --notes-file /tmp/notes.md
