name: release
on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs['crates/cli--release_created'] }}
      tag_name: ${{ steps.rp.outputs['crates/cli--tag_name'] }}
      cockpit_release_created: ${{ steps.rp.outputs['apps/cockpit/src-tauri--release_created'] }}
      cockpit_tag_name: ${{ steps.rp.outputs['apps/cockpit/src-tauri--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sidecar:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: >
          bun scripts/build-acp-sidecar.ts --bundle --all-targets
          --manifest dist/sidecar/manifest.json
          --release-tag "${{ needs.release-please.outputs.tag_name }}"
      - name: Upload sidecar assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/sidecar/* --clobber
      - name: Hand the manifest to the goreleaser job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sidecar-manifest
          path: dist/sidecar/manifest.json
          retention-days: 1

  goreleaser:
    needs: [release-please, sidecar]
    if: needs.release-please.outputs.release_created == 'true'
    # macos-latest: the ONLY host that can link the darwin targets (needs the
    # macOS SDK); the 4 linux targets cross-compile mac->linux via zigbuild.
    # Docker is not available here — images are built by the `docker` job below.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0
      - run: cargo install --locked cargo-zigbuild
      - name: Embed the release sidecar manifest (pins adapter version + sha256 into the binaries)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sidecar-manifest
          path: /tmp/sidecar
      - run: cp /tmp/sidecar/manifest.json crates/core/sidecar.manifest.json
      - name: Validate the injected manifest parses (same serde path the binary uses)
        run: cargo test -p ryuzi-core sidecar
      # The step above deliberately overwrites the TRACKED crates/core/sidecar.manifest.json,
      # which leaves the git tree dirty. `goreleaser release --clean` (without --skip=validate)
      # refuses to run against a dirty tree AND cross-checks the current commit's tag, but this
      # job only ever runs on the release-please merge commit, so we lose little by skipping
      # that validation — the manifest correctness itself is already gated by the cargo test
      # step above, which exercises the exact serde path the released binaries use.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  docker:
    needs: [release-please, goreleaser]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (for the Dockerfile)
      - name: Download the released musl binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.release-please.outputs.tag_name }}" \
            --pattern 'ryuzi-*-unknown-linux-musl.tar.gz' -D dl/
          mkdir -p ctx/amd64 ctx/arm64
          tar -xzf dl/ryuzi-*-x86_64-unknown-linux-musl.tar.gz  -C ctx/amd64 ryuzi
          tar -xzf dl/ryuzi-*-aarch64-unknown-linux-musl.tar.gz -C ctx/arm64 ryuzi
          cp Dockerfile ctx/amd64/ && cp Dockerfile ctx/arm64/
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, push, and manifest
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          IMG="ghcr.io/alfin-efendy/ryuzi"
          LABELS="--label org.opencontainers.image.version=${VERSION} \
                  --label org.opencontainers.image.revision=${GITHUB_SHA} \
                  --label org.opencontainers.image.source=https://github.com/alfin-efendy/ryuzi"
          docker buildx build --push --pull --platform linux/amd64 $LABELS -t "$IMG:${VERSION}-amd64" ctx/amd64
          docker buildx build --push --pull --platform linux/arm64 $LABELS -t "$IMG:${VERSION}-arm64" ctx/arm64
          docker buildx imagetools create -t "$IMG:${VERSION}" -t "$IMG:latest" \
            "$IMG:${VERSION}-amd64" "$IMG:${VERSION}-arm64"

  npm:
    needs: [release-please, goreleaser]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Download the released binaries (no rebuild — one provenance per release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ needs.release-please.outputs.tag_name }}" --pattern 'ryuzi-*.tar.gz' -D out/
      - name: Stamp version + assemble packages
        run: |
          VERSION="${TAG#v}"
          bun scripts/npm/set-version.ts "$VERSION"
          ./scripts/npm/assemble.sh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
      - name: Publish platform packages first
        run: |
          for dir in npm/platform/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "skip ${name}@${ver} (already published)"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package last
        run: |
          name=$(node -p "require('./npm/ryuzi/package.json').name")
          ver=$(node -p "require('./npm/ryuzi/package.json').version")
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "skip ${name}@${ver} (already published)"
          else
            npm publish ./npm/ryuzi --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cockpit:
    needs: release-please
    if: needs.release-please.outputs.cockpit_release_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/cockpit-release.yml
    with:
      tag: ${{ needs.release-please.outputs.cockpit_tag_name }}
    secrets: inherit
