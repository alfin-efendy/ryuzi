name: cockpit-desktop

# Build the Cockpit desktop app (Tauri) for Windows + macOS + Linux and upload
# the installers as downloadable artifacts — for smoke-testing on real devices.
#
# Triggers:
#   - pull_request touching apps/cockpit (so binaries are available on the PR
#     without merging) — switch to dispatch-only once this lands on main.
#   - workflow_dispatch (manual, after merge).
#
# NOTE: the ACP adapter sidecar is resolved at runtime by the shared tiered
# resolver (ryuzi_core::sidecar), not bundled by Tauri. First run needs
# network access (or a host `bun` >= the pinned min version) to download the
# cached artifact; set RYUZI_ACP_PATH to override with a local build. macOS
# builds are UNSIGNED — open via right-click -> Open.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/cockpit/**"
      - "packages/ui/**"
      - ".github/workflows/cockpit-desktop.yml"

concurrency:
  group: cockpit-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build Cockpit (tauri build)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/cockpit

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-${{ matrix.name }}
          if-no-files-found: error
          retention-days: 7
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
