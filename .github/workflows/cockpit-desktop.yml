name: cockpit-desktop

# Build the Cockpit desktop app (Tauri) for Windows + macOS + Linux and upload
# the installers as downloadable artifacts — for smoke-testing on real devices.
#
# Triggers:
#   - schedule (nightly bundling smoke, 03:30 WIB).
#   - workflow_dispatch (manual, on-demand).
#
# NOTE: macOS builds are UNSIGNED — open via right-click -> Open.

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *" # nightly bundling smoke, 03:30 WIB

concurrency:
  group: cockpit-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun

      - uses: ./.github/actions/setup-rust

      - name: Install Linux system deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Cockpit (tauri build)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/cockpit

      - name: Upload installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cockpit-${{ matrix.name }}
          if-no-files-found: error
          retention-days: 7
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/dmg/*.dmg
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
