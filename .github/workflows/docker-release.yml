name: docker-release
# (Re)builds and pushes the ghcr.io images for an EXISTING `vX.Y.Z` release
# from its already-uploaded musl tarballs — the backfill path for when the
# docker job in release.yml was skipped because goreleaser failed (v0.5.0).
# Mirrors that job 1:1; run cli-release first if the tarballs are missing.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag whose musl tarballs to package (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (for the Dockerfile)
      - name: Download the released musl binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --pattern 'ryuzi-*-unknown-linux-musl.tar.gz' -D dl/
          mkdir -p ctx/amd64 ctx/arm64
          tar -xzf dl/ryuzi-*-x86_64-unknown-linux-musl.tar.gz  -C ctx/amd64 ryuzi
          tar -xzf dl/ryuzi-*-aarch64-unknown-linux-musl.tar.gz -C ctx/arm64 ryuzi
          cp Dockerfile ctx/amd64/ && cp Dockerfile ctx/arm64/
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, push, and manifest
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IMG="ghcr.io/alfin-efendy/ryuzi"
          LABELS="--label org.opencontainers.image.version=${VERSION} \
                  --label org.opencontainers.image.revision=${GITHUB_SHA} \
                  --label org.opencontainers.image.source=https://github.com/alfin-efendy/ryuzi"
          docker buildx build --push --pull --platform linux/amd64 $LABELS -t "$IMG:${VERSION}-amd64" ctx/amd64
          docker buildx build --push --pull --platform linux/arm64 $LABELS -t "$IMG:${VERSION}-arm64" ctx/arm64
          docker buildx imagetools create -t "$IMG:${VERSION}" -t "$IMG:latest" \
            "$IMG:${VERSION}-amd64" "$IMG:${VERSION}-arm64"
