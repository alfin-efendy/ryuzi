contract = 1
id = "cavemem"
name = "Cavemem"
version = "0.1.0"
publisher = "community (JuliusBrussee)"
description = "Local, SQLite-backed agent memory (search/timeline/get_observations tools) via the community `cavemem` npm CLI (JuliusBrussee, MIT, active). Requires a one-time global install (`npm i -g cavemem && cavemem install`) before use. Not to be confused with the same author's `caveman` project, which is an unrelated token-compression tool, not a memory server. The exact MCP launch subcommand is unconfirmed upstream — this manifest assumes `cavemem mcp`; adjust if the installed CLI names it differently."
homepage = "https://github.com/JuliusBrussee/cavemem"
icon = "brain"
categories = ["memory"]
verified = false

[[settings]]
key = "plugin.cavemem.home"
label = "Cavemem data directory (CAVEMEM_HOME)"
help = "Optional: overrides where cavemem stores its local SQLite memory store. Set CAVEMEM_HOME in the environment ryuzi runs in — this field is documentation only, ryuzi does not forward it automatically."
required = false

[[mcp]]
name = "cavemem"
transport = "stdio"
command = "cavemem"
args = ["mcp"]
