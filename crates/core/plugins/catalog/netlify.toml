contract = 1
id = "netlify"
name = "Netlify"
version = "0.1.0"
publisher = "Netlify (official)"
description = "Site, deploy, and build-log access via Netlify's official MCP server, run over stdio through `npx` (a remote `https://netlify-mcp.netlify.app/mcp` endpoint also exists as an alternative). Accepts either a Netlify CLI login session or a personal access token — this manifest wires the token path."
homepage = "https://docs.netlify.com/api/get-started/"
icon = "cloud"
categories = ["deploy"]
verified = true

[auth]
kind = "token"
setting = "plugin.netlify.token"
env = "NETLIFY_PERSONAL_ACCESS_TOKEN"
help_url = "https://app.netlify.com/user/applications#personal-access-tokens"

[[mcp]]
name = "netlify"
transport = "stdio"
command = "npx"
args = ["-y", "@netlify/mcp"]
env = { NETLIFY_PERSONAL_ACCESS_TOKEN = "${auth}" }

[menu]
section = "plugins"
label = "Netlify"
