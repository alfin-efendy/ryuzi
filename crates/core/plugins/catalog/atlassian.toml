contract = 1
id = "atlassian"
name = "Atlassian"
version = "0.1.0"
publisher = "Atlassian (official)"
description = "Jira issues, Confluence pages, and Bitbucket repos via Atlassian's official remote Rovo MCP server. Requires Atlassian's OAuth 2.1 login (Bitbucket alone can fall back to an API token, but that path isn't wired here — v1 only brokers OAuth-free connectors). The previous SSE-based endpoint was retired 2026-06-30; this manifest points at the current `/v1/mcp/authv2` endpoint instead."
homepage = "https://www.atlassian.com/platform/remote-mcp-server"
icon = "kanban"
categories = ["issues", "wiki", "vcs"]
verified = true

[auth]
kind = "oauth"
help_url = "https://www.atlassian.com/platform/remote-mcp-server"
resource = "https://mcp.atlassian.com/v1/mcp/authv2"
dynamic-registration = true

[[mcp]]
name = "atlassian"
transport = "http"
url = "https://mcp.atlassian.com/v1/mcp/authv2"
