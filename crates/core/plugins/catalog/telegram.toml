contract = 1
id = "telegram"
name = "Telegram"
version = "0.1.0"
publisher = "community (n24q02m)"
description = "Send and read Telegram messages via the community `better-telegram-mcp` server (n24q02m, active), run locally through `uvx` (the `uv` Python tool runner must be installed). No official Telegram MCP server exists today. Requires a bot token from @BotFather."
homepage = "https://github.com/n24q02m/better-telegram-mcp"
icon = "send"
categories = ["communication"]
verified = false

[auth]
kind = "token"
setting = "plugin.telegram.bot_token"
env = "TELEGRAM_BOT_TOKEN"
help_url = "https://core.telegram.org/bots#botfather"

[[mcp]]
name = "telegram"
transport = "stdio"
command = "uvx"
args = ["better-telegram-mcp"]
env = { TELEGRAM_BOT_TOKEN = "${auth}" }
