contract = 1
id = "sentry"
name = "Sentry"
version = "0.1.0"
publisher = "Sentry (official)"
description = "Issues, events, and root-cause search via Sentry's official remote MCP server. Auth is OAuth only in this manifest. A stdio alternative exists (`npx @sentry/mcp-server@latest` with SENTRY_ACCESS_TOKEN and SENTRY_HOST) for self-hosted or headless setups, but the hosted server is what is wired here."
homepage = "https://docs.sentry.io/product/sentry-mcp/"
icon = "bug"
categories = ["observability"]
verified = true

[auth]
kind = "oauth"
help_url = "https://docs.sentry.io/product/sentry-mcp/"
resource = "https://mcp.sentry.dev/mcp"
dynamic-registration = true

[[mcp]]
name = "sentry"
transport = "http"
url = "https://mcp.sentry.dev/mcp"

