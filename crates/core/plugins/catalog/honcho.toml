contract = 1
id = "honcho"
name = "Honcho"
version = "0.1.0"
publisher = "Plastic Labs (official)"
description = "User-modeling and long-term memory via Honcho's official hosted MCP server. Requires TWO headers: a Bearer token (starts with `hch-`) and an `X-Honcho-User-Name` header identifying which Honcho user/peer the session acts as — both are required by the server."
homepage = "https://docs.honcho.dev"
icon = "brain"
categories = ["memory"]
verified = true

[auth]
kind = "token"
setting = "plugin.honcho.token"
help_url = "https://docs.honcho.dev"

[[settings]]
key = "plugin.honcho.user"
label = "Honcho user name"
help = "Sent as the X-Honcho-User-Name header; identifies which Honcho user/peer this session acts as."
required = true

[[mcp]]
name = "honcho"
transport = "http"
url = "https://mcp.honcho.dev"
headers = { Authorization = "Bearer ${auth}", X-Honcho-User-Name = "${setting:plugin.honcho.user}" }

[menu]
section = "plugins"
label = "Honcho"
