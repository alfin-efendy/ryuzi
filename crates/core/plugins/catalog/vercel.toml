contract = 1
id = "vercel"
name = "Vercel"
version = "0.1.0"
publisher = "Vercel (official)"
description = "Project, deployment, and log access — with both read and write operations today — via Vercel's official remote MCP server. OAuth is restricted to approved clients only, not general open registration."
homepage = "https://vercel.com/docs"
icon = "triangle"
categories = ["deploy"]
verified = true

[auth]
kind = "oauth"
help_url = "https://vercel.com/docs"
resource = "https://mcp.vercel.com"
# Vercel restricts OAuth to approved clients (see description), but its
# metadata document has exposed a registration_endpoint — attempting DCR
# costs nothing: a rejected registration degrades to the install wizard's
# manual client-id form.
dynamic-registration = true

[[mcp]]
name = "vercel"
transport = "http"
url = "https://mcp.vercel.com"
