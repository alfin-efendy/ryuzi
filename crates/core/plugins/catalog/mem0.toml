contract = 1
id = "mem0"
name = "Mem0"
version = "0.1.0"
publisher = "Mem0 (official)"
description = "Long-term memory (add/search/get) via Mem0's official hosted MCP server. Mem0's OpenMemory product is being sunset and the `mem0ai/mem0-mcp` repo was archived 2026-03-24 — `mcp.mem0.ai` is the supported path now. The `Authorization: Bearer` header shape below was inferred, not confirmed by research — if the connection fails, check Mem0's docs (help_url below) for the exact header scheme."
homepage = "https://docs.mem0.ai/"
icon = "brain"
categories = ["memory"]
verified = true

[auth]
kind = "token"
setting = "plugin.mem0.api_key"
env = "MEM0_API_KEY"
help_url = "https://app.mem0.ai/dashboard/api-keys"

[[mcp]]
name = "mem0"
transport = "http"
url = "https://mcp.mem0.ai/mcp"
headers = { Authorization = "Bearer ${auth}" }

[menu]
section = "plugins"
label = "Mem0"
