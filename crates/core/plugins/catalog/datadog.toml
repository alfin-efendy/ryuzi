contract = 1
id = "datadog"
name = "Datadog"
version = "0.1.0"
publisher = "Datadog (official)"
description = "Monitors, dashboards, and telemetry search via Datadog's official remote MCP server (GA March 2026). Auth accepts OAuth or a paired API key + application key sent as headers — this manifest wires the header path. The URL below targets the default US1 site (datadoghq.com) and still carries an `unstable` path segment upstream; if your org is on another site (EU, US3, US5, AP1, or the GovCloud host), reconfigure the URL manually — see `plugin.datadog.site` below for the value to substitute."
homepage = "https://docs.datadoghq.com/"
icon = "activity"
categories = ["observability"]
verified = false

[auth]
kind = "token"
setting = "plugin.datadog.api_key"
env = "DD_API_KEY"
help_url = "https://docs.datadoghq.com/account_management/api-app-keys/"

[[settings]]
key = "plugin.datadog.app_key"
label = "Datadog application key"
help = "Paired with the API key to authenticate (sent as the DD-APPLICATION-KEY header)."
secret = true
required = true

[[settings]]
key = "plugin.datadog.site"
label = "Datadog site (optional)"
help = "Your Datadog site host (e.g. datadoghq.eu, us3.datadoghq.com, us5.datadoghq.com, ap1.datadoghq.com, ddog-gov.com) if you are not on the default US1 site (datadoghq.com). This manifest's URL is hardcoded to US1 — update it manually if you're on another site."
required = false

[[mcp]]
name = "datadog"
transport = "http"
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"
headers = { DD-API-KEY = "${auth}", DD-APPLICATION-KEY = "${setting:plugin.datadog.app_key}" }
